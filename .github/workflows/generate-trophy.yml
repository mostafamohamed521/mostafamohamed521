name: Generate Trophy

on:
  schedule:
    - cron: "0 0 * * *"   # يشتغل كل يوم الساعة 12 بالليل UTC
  workflow_dispatch:        # يديك زرار تشغيل يدوي من تبويب Actions

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: mostafamohamed521
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trophy.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update trophy.svg"
          git push
